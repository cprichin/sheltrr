<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sheltrr Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 6px; }
    h1 { font-size: 1.8rem; color: #1F4E79; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
    .step-dot.active { background: #1F4E79; }
    .step-dot.done { background: #4CAF50; }
    .step-label { font-size: 1rem; color: #555; margin-bottom: 16px; }
    .pin-display { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #1F4E79; background: white; transition: background 0.2s;
    }
    .pin-dot.filled { background: #1F4E79; }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .pin-key {
      padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px;
      background: white; font-size: 1.4rem; font-weight: 600; color: #1a1a1a;
      cursor: pointer; transition: all 0.15s;
    }
    .pin-key:active { background: #1F4E79; color: white; transform: scale(0.95); }
    .pin-key.delete { font-size: 1rem; color: #c62828; }
    .pin-key.empty { border-color: transparent; background: transparent; cursor: default; }
    .location-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 12px;
    }
    .location-btn {
      padding: 16px 10px; border: 2px solid #e2e8f0; border-radius: 12px;
      background: white; font-size: 0.95rem; font-weight: 600; color: #555;
      cursor: pointer; transition: all 0.2s;
    }
    .location-btn:hover { border-color: #1F4E79; color: #1F4E79; background: #f0f6ff; }
    .location-btn.selected { border-color: #1F4E79; background: #1F4E79; color: white; }
    .badge {
      display: inline-block; padding: 6px 14px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; margin-bottom: 12px;
    }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-blue { background: #e3f2fd; color: #1565c0; }
    .tap-hint {
      background: #f0f4f8; border-radius: 12px; padding: 20px;
      margin-bottom: 12px; color: #555; font-size: 0.9rem; line-height: 1.5;
    }
    .uid-input {
      width: 100%; padding: 14px 16px; border: 2px solid #ddd;
      border-radius: 10px; font-size: 1rem; margin-bottom: 12px;
      transition: border-color 0.2s; text-transform: uppercase;
    }
    .uid-input:focus { outline: none; border-color: #1F4E79; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; margin-bottom: 10px;
    }
    .btn-primary { background: #1F4E79; color: white; }
    .btn-primary:hover { background: #174069; }
    .btn-secondary { background: #f0f4f8; color: #555; }
    .btn-secondary:hover { background: #e2e8f0; }
    .status-box {
      margin-top: 20px; padding: 16px; border-radius: 12px;
      font-size: 1rem; font-weight: 500; min-height: 56px;
      display: flex; align-items: center; justify-content: center;
      white-space: pre-line; transition: all 0.3s;
    }
    .status-idle { background: #f0f4f8; color: #888; }
    .status-success { background: #e8f5e9; color: #2e7d32; }
    .status-error { background: #ffebee; color: #c62828; }
    .status-loading { background: #e3f2fd; color: #1565c0; }
    .hidden { display: none; }
    .nfc-icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🐾</div>
  <h1>Sheltrr</h1>
  <p class="subtitle">Shelter Walk Tracker</p>

  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- Step 1: PIN -->
  <div id="step1">
    <p class="step-label">Enter your 4-digit PIN</p>
    <div class="pin-display">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key delete" onclick="pinDelete()">⌫</button>
    </div>
  </div>

  <!-- Step 2: Location -->
  <div id="step2" class="hidden">
    <div id="vol-badge" class="badge badge-green"></div>
    <div class="nfc-icon">📍</div>
    <p class="step-label">Where are you taking the dog?</p>
    <div class="location-grid" id="location-grid"></div>
    <button class="btn btn-secondary" onclick="resetFlow()">← Change Volunteer</button>
  </div>

  <!-- Step 3: Cage Tag -->
  <div id="step3" class="hidden">
    <div id="vol-badge2" class="badge badge-green"></div>
    <div id="loc-badge" class="badge badge-blue"></div>
    <div class="nfc-icon">🏷️</div>
    <div class="tap-hint" id="tap-hint">
      Tap your phone to the cage NFC tag to log the walk.
    </div>
    <button class="btn btn-secondary" onclick="showStep(2)">← Change Location</button>
  </div>

  <div class="status-box status-idle" id="status">Ready</div>
</div>

<script>
  const API = `http://${window.location.hostname}:8000/api`;
  let currentPin = "";
  let verifiedVolunteerId = null;
  let verifiedVolunteerName = null;
  let selectedLocationId = null;
  let selectedLocationName = null;
  let tagFromUrl = null;
  let locations = [];

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(window.location.search);
    tagFromUrl = params.get("tag") || null;
    await loadLocations();
  }

  async function loadLocations() {
    try {
      const res = await fetch(`${API}/locations/`);
      locations = await res.json();
      const grid = document.getElementById("location-grid");
      grid.innerHTML = locations.map(loc =>
        `<button class="location-btn" onclick="selectLocation(${loc.id}, '${loc.name}', event)">${loc.name}</button>`
      ).join("");
    } catch {
      setStatus("Could not load locations", "error");
    }
  }

  // ── STEP CONTROL ──────────────────────────────────────────────────────────
  function setStatus(msg, type) {
    if (!type) type = "idle";
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status-box status-" + type;
  }

  function showStep(step) {
    [1, 2, 3].forEach(s => {
      document.getElementById(`step${s}`).classList.toggle("hidden", s !== step);
      const dot = document.getElementById(`dot${s}`);
      if (s < step) dot.className = "step-dot done";
      else if (s === step) dot.className = "step-dot active";
      else dot.className = "step-dot";
    });
  }

  function resetFlow() {
    currentPin = "";
    verifiedVolunteerId = null;
    verifiedVolunteerName = null;
    selectedLocationId = null;
    selectedLocationName = null;
    updatePinDisplay();
    setStatus("Ready", "idle");
    showStep(1);
  }

  // ── STEP 1: PIN ───────────────────────────────────────────────────────────
  function pinPress(digit) {
    if (currentPin.length >= 4) return;
    currentPin += digit;
    updatePinDisplay();
    if (currentPin.length === 4) {
      setTimeout(verifyPin, 200);
    }
  }

  function pinDelete() {
    currentPin = currentPin.slice(0, -1);
    updatePinDisplay();
  }

  function updatePinDisplay() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`pd${i}`);
      dot.className = "pin-dot" + (i < currentPin.length ? " filled" : "");
    }
  }

  async function verifyPin() {
    setStatus("Verifying...", "loading");
    try {
      const res = await fetch(`${API}/volunteers/verify-pin`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: currentPin })
      });
      if (!res.ok) {
        currentPin = "";
        updatePinDisplay();
        setStatus("PIN not recognized — try again", "error");
        setTimeout(() => setStatus("Enter your PIN", "idle"), 2000);
        return;
      }
      const data = await res.json();
      verifiedVolunteerId = data.id;
      verifiedVolunteerName = data.name;
      document.getElementById("vol-badge").textContent = "👤 " + data.name;
      document.getElementById("vol-badge2").textContent = "👤 " + data.name;
      setStatus("Welcome, " + data.name, "success");
      setTimeout(() => {
        setStatus("Select a location", "idle");
        showStep(2);
      }, 800);
    } catch {
      setStatus("Connection error", "error");
      currentPin = "";
      updatePinDisplay();
    }
  }

  // ── STEP 2: LOCATION ──────────────────────────────────────────────────────
  function selectLocation(id, name, evt) {
    selectedLocationId = id;
    selectedLocationName = name;
    document.querySelectorAll(".location-btn").forEach(b => b.classList.remove("selected"));
    evt.target.classList.add("selected");
    document.getElementById("loc-badge").textContent = "📍 " + name;
    setTimeout(function() {
      setStatus("Now tap the cage NFC tag", "idle");
      showStep(3);
      startNFC();
    }, 300);
  }

  // ── STEP 3: CAGE TAG ──────────────────────────────────────────────────────
  function startNFC() {
    // Tag came from URL (iPhone tap)
    if (tagFromUrl) {
      document.getElementById("tap-hint").textContent =
        "Cage tag detected: " + tagFromUrl + "\nSubmitting...";
      submitWithTag(tagFromUrl);
      tagFromUrl = null;
      return;
    }

    // Web NFC (Android Chrome)
    if ("NDEFReader" in window) {
      try {
        const reader = new NDEFReader();
        reader.scan().then(() => {
          document.getElementById("tap-hint").textContent =
            "NFC ready — tap the cage tag to the back of your phone.";
          reader.onreading = (event) => {
            const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
            submitWithTag(uid);
          };
        });
        return;
      } catch {}
    }

    // Manual fallback
    document.getElementById("tap-hint").innerHTML =
      `NFC not available on this device.<br><br>
      <input id="manual-tag" class="uid-input" type="text" placeholder="Enter cage UID manually" />
      <button class="btn btn-primary" onclick="submitManual()">Submit</button>`;
  }

  function submitManual() {
    const tag = document.getElementById("manual-tag").value.trim().toUpperCase();
    if (!tag) { setStatus("Please enter a cage UID", "error"); return; }
    submitWithTag(tag);
  }

  async function submitWithTag(tagUid) {
    setStatus("Submitting...", "loading");
    try {
      const res = await fetch(`${API}/walks/scan`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          pin: currentPin,
          tag_uid: tagUid,
          location_id: selectedLocationId
        })
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus("Error: " + data.detail, "error");
        return;
      }
      if (data.action === "checked_out") {
        setStatus("✅ " + data.dog + " checked OUT\n" + data.location + " · " + data.volunteer, "success");
      } else {
        setStatus("🏠 " + data.dog + " checked IN\n" + data.volunteer + " · " + data.duration_minutes + " min", "success");
      }
      setTimeout(function() {
        setStatus("Ready for next scan", "idle");
        showStep(3);
        startNFC();
      }, 3000);
    } catch {
      setStatus("Connection error — is the server running?", "error");
    }
  }

  init();
</script>
</body>
</html>
